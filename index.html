<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
 margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  font-family:Arial,sans-serif;
  color:white;
  text-align:center;

  background:#05070a;
  overflow:hidden;
}
    

body::before{
  content:"";
  position:fixed;
  inset:-50%;
  z-index:-1;
  background:
    radial-gradient(circle at 30% 40%, rgba(0,255,255,.35), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(0,150,255,.35), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(0,255,200,.25), transparent 50%);

  filter:blur(80px);
  animation:liquidMove 18s linear infinite;
 
}
body::after{
  content:"";
  position:fixed;
  inset:-50%;
  z-index:-1;
  background:
    radial-gradient(circle at 60% 30%, rgba(0,200,255,.25), transparent 45%),
    radial-gradient(circle at 40% 70%, rgba(0,255,180,.2), transparent 50%);

  filter:blur(120px);
  animation:liquidMove2 24s linear infinite;
}

@keyframes liquidMove{
  0%{transform:translate(-10%, -10%)}
  50%{transform:translate(10%, 10%)}
  100%{transform:translate(-10%, -10%)}
}

@keyframes liquidMove2{
  0%{transform:translate(10%, -10%)}
  50%{transform:translate(-10%, 10%)}
  100%{transform:translate(10%, -10%)}
}
/* title */

h1{
  font-size:clamp(28px,6vw,48px);
  color:#39ff14;
  text-shadow:0 0 10px #39ff14,0 0 30px #00ffee;
}

/* button */

#button{
  width:min(70vw,260px);
  cursor:pointer;
  user-select:none;
  touch-action:manipulation;
  transition:transform .15s, filter .15s;

  filter:drop-shadow(0 0 20px #00ffee);
}

#button:hover{
  transform:scale(1.08);
}

#button:active{
  transform:scale(.95);
}

/* counter */

#counter{
  font-size:clamp(36px,8vw,60px);
  margin-top:20px;
  color:#00ffee;
  text-shadow:0 0 10px #00ffee;
}

/* message */

#message{
  margin-top:20px;
  font-size:clamp(16px,4vw,22px);
  max-width:500px;
  opacity:.9;
}

.pulse{
  animation:pulse .25s;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.15)}
  100%{transform:scale(1)}
}

</style>
</head>

<body>

<h1>ENERGY DRINK COUNTER</h1>

<img id="button" src="button.png">

<div id="counter">0</div>
<div id="message">Tap to drink.</div>

<script>

let count = 0

const button = document.getElementById("button")
const counter = document.getElementById("counter")
const message = document.getElementById("message")

const jokes = {
  1: "First one of the day. A classic opening move.",
  5: "Five already? Heart rate increasing.",
  10: "Doctor recommended limit has been ignored.",
  15: "Caffeine levels: industrial.",
  20: "Sleep is now optional.",
  25: "This is becoming a lifestyle.",
  30: "At this point we should call a scientist.",
  40: "NASA could power a rocket with this.",
  50: "Congratulations. You are now 30% caffeine.",
  60: "توأم روحك هيوحشك",
  70: "Might as well go for 100.",
  80: "Almost there.",
  90: "Such is the life of a med student.",
  100: "Good girl."
}

button.onclick = () => {

  count++
  counter.textContent = count

  if(jokes[count]){
    message.textContent = jokes[count]
  }

  button.classList.remove("pulse")
  void button.offsetWidth
  button.classList.add("pulse")
}

</script>

</body>
</html>
